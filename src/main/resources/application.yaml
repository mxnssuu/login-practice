spring:
  application:
    name: login-practice
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: true
    open-in-view: false

server:
  port: 8081

jwt:
  secret: ThisIsMySecretKeyForJwtTokenPleaseChangeItInProduction123456
  expiration: 3600000